<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pokémon Emerald Online — GBA Emulator</title>
<style>
:root {
    --lc-bg-dark: #101018;
    --lc-bg-mid: #1c1c24;
    --lc-border: #2c2c34;
    --lc-cyan: #18e0e0;
    --lc-gold: #e0d020;
    --lc-text: #eaeae0;
    --lc-text-dim: #484850;
    --lc-shadow: #080810;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--lc-bg-dark);
    color: var(--lc-text);
    font-family: 'Segoe UI', 'Roboto', monospace;
    display: flex; flex-direction: column;
    align-items: center; min-height:100vh;
}
h1 {
    margin: 20px 0 8px;
    font-size: 1.4rem;
    color: var(--lc-cyan);
    text-shadow: 0 0 8px rgba(24,224,224,0.4);
}
.subtitle { color: var(--lc-text-dim); font-size: 0.85rem; margin-bottom: 16px; }
#screen-container {
    position: relative;
    border: 2px solid var(--lc-border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 24px rgba(24,224,224,0.15), inset 0 0 40px rgba(0,0,0,0.5);
    background: #000;
}
canvas#screen {
    display: block;
    width: 480px; height: 320px;
    image-rendering: pixelated;
}
.controls {
    display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; justify-content: center;
}
.controls button, .controls label, .controls input, .controls select {
    font-family: inherit; font-size: 0.85rem;
    background: var(--lc-bg-mid);
    color: var(--lc-text);
    border: 1px solid var(--lc-border);
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
}
.controls button:hover { border-color: var(--lc-cyan); color: var(--lc-cyan); }
.controls input[type=text] { width: 160px; }
#status-bar {
    display: flex; gap: 16px; align-items: center;
    padding: 8px 16px; margin-bottom: 8px;
    background: var(--lc-bg-mid);
    border: 1px solid var(--lc-border);
    border-radius: 6px;
    font-size: 0.8rem;
}
.dot { display:inline-block; width:8px;height:8px;border-radius:50%;margin-right:4px; }
.dot-off { background:#444; }
.dot-on  { background:#0c0; }
.dot-err { background:#c00; }
#log {
    width: 480px; max-height: 120px; overflow-y: auto;
    background: var(--lc-bg-mid);
    border: 1px solid var(--lc-border);
    border-radius: 4px;
    padding: 8px; font-size: 0.75rem;
    color: var(--lc-text-dim);
    margin-top: 8px;
}
#log .info { color: var(--lc-text); }
#log .ok   { color: #0c0; }
#log .err  { color: #f44; }
</style>
</head>
<body>

<h1>Pokémon Emerald Online</h1>
<p class="subtitle">Retro Liquid Crystal — Multiplayer GBA Emulator</p>

<div id="status-bar">
    <span>ROM: <span id="rom-status">not loaded</span></span>
    <span>Server: <span class="dot dot-off" id="ws-dot"></span><span id="ws-status">disconnected</span></span>
    <span>Room: <span id="room-status">—</span></span>
    <span>FPS: <span id="fps-counter">0</span></span>
</div>

<div id="screen-container">
    <canvas id="screen" width="240" height="160"></canvas>
</div>

<div class="controls">
    <label>ROM: <input type="file" id="rom-file" accept=".gba"></label>
    <label>Server: <input type="text" id="ws-url" value="ws://localhost:8765" placeholder="ws://host:port"></label>
    <label>Room: <input type="text" id="room-id" value="emerald-1" placeholder="room name"></label>
    <button id="btn-connect">Connect</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
</div>

<div id="log"></div>

<script src="mgba.js"></script>
<script>
/**
 * GBA Online Emulator — mGBA WASM Core + Netplay
 */

const $ = s => document.querySelector(s);
const log = (msg, cls = 'info') => {
    const el = document.createElement('div');
    el.className = cls;
    el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    const logEl = $('#log');
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
};

/* ── Canvas ──────────────────────────────────────────── */
const canvas = $('#screen');
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#101018';
ctx.fillRect(0, 0, 240, 160);
ctx.fillStyle = '#18e0e0';
ctx.font = '12px monospace';
ctx.fillText('Load a .gba ROM to start', 32, 80);

let romLoaded = false;
let emuRunning = false;
let frameCount = 0;
let lastFpsTime = performance.now();

/* ── mGBA WASM Core ─────────────────────────────────── */
let mgba = null;        /* Emscripten Module */
let mgbaCreate, mgbaLoadRom, mgbaReset, mgbaRunFrame, mgbaGetPixels;
let mgbaSetKeys, mgbaGetWidth, mgbaGetHeight;
let mgbaRead8, mgbaRead16, mgbaRead32, mgbaWrite8, mgbaWrite16;
let mgbaFrameCounter, mgbaDestroy;

async function initMGBA() {
    log('Loading mGBA WASM core…');
    try {
        mgba = await createMGBA();
        mgbaCreate    = mgba.cwrap('mgba_create',        'number', []);
        mgbaLoadRom   = mgba.cwrap('mgba_load_rom',      'number', ['number','number']);
        mgbaReset     = mgba.cwrap('mgba_reset',         'number', []);
        mgbaRunFrame  = mgba.cwrap('mgba_run_frame',      null,    []);
        mgbaGetPixels = mgba.cwrap('mgba_get_pixels',    'number', []);
        mgbaSetKeys   = mgba.cwrap('mgba_set_keys',       null,    ['number']);
        mgbaGetWidth  = mgba.cwrap('mgba_get_width',     'number', []);
        mgbaGetHeight = mgba.cwrap('mgba_get_height',    'number', []);
        mgbaRead8     = mgba.cwrap('mgba_read8',         'number', ['number']);
        mgbaRead16    = mgba.cwrap('mgba_read16',        'number', ['number']);
        mgbaRead32    = mgba.cwrap('mgba_read32',        'number', ['number']);
        mgbaWrite8    = mgba.cwrap('mgba_write8',         null,    ['number','number']);
        mgbaWrite16   = mgba.cwrap('mgba_write16',        null,    ['number','number']);
        mgbaFrameCounter = mgba.cwrap('mgba_frame_counter','number',[]);
        mgbaDestroy   = mgba.cwrap('mgba_destroy',        null,    []);

        if (!mgbaCreate()) {
            log('Failed to create mGBA core', 'err');
            return false;
        }
        log('mGBA core initialized', 'ok');
        return true;
    } catch (e) {
        log(`mGBA init error: ${e.message}`, 'err');
        return false;
    }
}

/* ── ROM Loading ─────────────────────────────────────── */
$('#rom-file').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const buf = await file.arrayBuffer();
    const romBytes = new Uint8Array(buf);

    if (!mgba) {
        const ok = await initMGBA();
        if (!ok) return;
    }

    /* Copy ROM to WASM heap */
    const ptr = mgba._malloc(romBytes.length);
    mgba.HEAPU8.set(romBytes, ptr);

    const ok = mgbaLoadRom(ptr, romBytes.length);
    /* Don't free ptr — mGBA owns the VFile memory now (glue copies it) */
    mgba._free(ptr);

    if (ok <= 0) {
        log('Failed to load ROM', 'err');
        return;
    }

    if (!mgbaReset()) {
        log('Failed to reset core after ROM load', 'err');
        return;
    }

    romLoaded = true;
    $('#rom-status').textContent = file.name;
    log(`ROM loaded: ${file.name} (${(romBytes.byteLength / 1048576).toFixed(1)} MB)`, 'ok');
    startEmulator();
});

/* ── Emulator main loop ─────────────────────────────── */
const imageData = new ImageData(240, 160);

function startEmulator() {
    if (emuRunning) return;
    emuRunning = true;
    log('Emulator running — mGBA core', 'ok');

    const targetFps = 59.7275;
    const frameDuration = 1000 / targetFps;
    let lastFrameTime = performance.now();

    function tick() {
        if (!emuRunning) return;

        const now = performance.now();

        /* Run mGBA for one frame */
        mgbaSetKeys(currentKeys);
        mgbaRunFrame();

        /* Blit pixels to canvas */
        const pixPtr = mgbaGetPixels();
        if (pixPtr) {
            const pixels = new Uint8Array(mgba.HEAPU8.buffer, pixPtr, 240 * 160 * 4);
            imageData.data.set(pixels);
            ctx.putImageData(imageData, 0, 0);
        }

        /* FPS counter */
        frameCount++;
        if (now - lastFpsTime >= 1000) {
            $('#fps-counter').textContent = frameCount;
            frameCount = 0;
            lastFpsTime = now;
        }

        /* Schedule next frame */
        const elapsed = performance.now() - now;
        const delay = Math.max(0, frameDuration - elapsed);
        setTimeout(tick, delay);
    }
    tick();
}

/* ── Key mapping (GBA button bits) ───────────────────── */
/* mGBA key bits: A=0, B=1, Select=2, Start=3, Right=4, Left=5, Up=6, Down=7, R=8, L=9 */
const KEY_A      = 1 << 0;
const KEY_B      = 1 << 1;
const KEY_SELECT = 1 << 2;
const KEY_START  = 1 << 3;
const KEY_RIGHT  = 1 << 4;
const KEY_LEFT   = 1 << 5;
const KEY_UP     = 1 << 6;
const KEY_DOWN   = 1 << 7;
const KEY_R      = 1 << 8;
const KEY_L      = 1 << 9;

const keyMap = {
    'ArrowUp':    KEY_UP,
    'ArrowDown':  KEY_DOWN,
    'ArrowLeft':  KEY_LEFT,
    'ArrowRight': KEY_RIGHT,
    'z':          KEY_A,
    'Z':          KEY_A,
    'x':          KEY_B,
    'X':          KEY_B,
    'Enter':      KEY_START,
    'Shift':      KEY_SELECT,
    'a':          KEY_L,
    'A':          KEY_L,
    's':          KEY_R,
    'S':          KEY_R,
};
let currentKeys = 0;

document.addEventListener('keydown', e => {
    const bit = keyMap[e.key];
    if (bit !== undefined) {
        currentKeys |= bit;
        e.preventDefault();
    }
});
document.addEventListener('keyup', e => {
    const bit = keyMap[e.key];
    if (bit !== undefined) {
        currentKeys &= ~bit;
        e.preventDefault();
    }
});

/* ── WebSocket Netplay ───────────────────────────────── */
let ws = null;
let connected = false;
let localState = null;

function wsConnect(url, room) {
    if (ws) wsDisconnect();

    ws = new WebSocket(url);
    log(`Connecting to ${url}…`);

    ws.onopen = () => {
        connected = true;
        $('#ws-dot').className = 'dot dot-on';
        $('#ws-status').textContent = 'connected';
        log('WebSocket connected', 'ok');

        wsSend({ type: 'hello', version: '1', name: 'web-player' });
        wsSend({ type: 'join', room: room });
    };

    ws.onmessage = (evt) => {
        let pkt;
        try { pkt = JSON.parse(evt.data); } catch { return; }
        handleServerPacket(pkt);
    };

    ws.onclose = () => {
        connected = false;
        $('#ws-dot').className = 'dot dot-off';
        $('#ws-status').textContent = 'disconnected';
        log('WebSocket closed');
    };

    ws.onerror = () => {
        $('#ws-dot').className = 'dot dot-err';
        $('#ws-status').textContent = 'error';
        log('WebSocket error', 'err');
    };
}

function wsDisconnect() {
    if (ws) {
        ws.close();
        ws = null;
    }
    connected = false;
    $('#ws-dot').className = 'dot dot-off';
    $('#ws-status').textContent = 'disconnected';
    $('#room-status').textContent = '—';
    $('#btn-connect').disabled = false;
    $('#btn-disconnect').disabled = true;
}

function wsSend(obj) {
    if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify(obj));
}

function handleServerPacket(pkt) {
    switch (pkt.type) {
    case 'hello_ack':
        log(`Authenticated as "${pkt.name}"`, 'ok');
        break;
    case 'joined':
        log(`Joined room "${pkt.room}" as side ${pkt.side}`, 'ok');
        $('#room-status').textContent = pkt.room;
        break;
    case 'start':
        log(`Match started! Seed: ${pkt.seed}`, 'ok');
        break;
    case 'peer_update':
        log(`Players in room: ${pkt.players.join(', ')}`);
        break;
    case 'player_state':
        handleRemoteState(pkt);
        break;
    case 'interact_request':
        log(`Interaction request: ${pkt.interaction}`, 'info');
        break;
    case 'pong':
        break;
    case 'error':
        log(`Server error: ${pkt.code}`, 'err');
        break;
    case 'welcome':
        break;
    default:
        log(`Unknown: ${pkt.type}`);
    }
}

function handleRemoteState(pkt) {
    if (!localState || pkt.mapGroup !== localState.lastRemoteMap) {
        log(`Remote player on map (${pkt.mapGroup},${pkt.mapNum}) at (${pkt.x},${pkt.y})`);
        if (localState) localState.lastRemoteMap = pkt.mapGroup;
    }
}

/* Send local state periodically — reads from emulator memory */
function broadcastLocalState() {
    if (!connected || !emuRunning) return;
    /* pokeemerald gPlayerAvatar + gSaveBlock1Ptr offsets  */
    /* Placeholder addrs — update with actual symbol offsets */
    wsSend({
        type: 'player_state',
        mapGroup: 0, mapNum: 0,
        x: 0, y: 0,
        facingDirection: 1,
        movementAction: 0,
        graphicsId: 0,
        frame: mgbaFrameCounter ? mgbaFrameCounter() : 0,
    });
}
setInterval(broadcastLocalState, 250);

/* Ping keep-alive */
setInterval(() => {
    if (connected) wsSend({ type: 'ping', ts: Date.now() });
}, 5000);

/* ── UI button handlers ──────────────────────────────── */
$('#btn-connect').addEventListener('click', () => {
    const url = $('#ws-url').value.trim();
    const room = $('#room-id').value.trim();
    if (!url || !room) { log('Enter server URL and room name', 'err'); return; }
    wsConnect(url, room);
    $('#btn-connect').disabled = true;
    $('#btn-disconnect').disabled = false;
});

$('#btn-disconnect').addEventListener('click', wsDisconnect);

log('Ready. Load a ROM and connect to play online.');
</script>
</body>
</html>
